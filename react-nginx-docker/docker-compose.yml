services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime           # Nur die runtime-Stage bauen
    ports:
      - "3000:80"               # http://localhost:3000 → Container Port 80
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
